<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leave a review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="public-flow-body">
    <main class="public-flow-shell">
      <section class="public-flow-card">
        <p class="eyebrow"><i data-lucide="star"></i> Review</p>
        <h1 id="reviewTitle">Leave a review</h1>
        <p id="reviewDetail">Choose the review service you prefer.</p>
        <div class="review-button-list" id="reviewLinks"></div>
        <p class="form-message" id="reviewMessage"></p>
      </section>
    </main>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <script src="/reviews/reviews.js" type="module"></script>
  </body>
</html>
